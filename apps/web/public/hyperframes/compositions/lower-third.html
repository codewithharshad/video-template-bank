<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; }
    [data-composition-id="lower-third"] {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 0 0 80px 80px;
    }
    [data-composition-id="lower-third"] .bar {
      display: flex;
      align-items: center;
      gap: 0;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 8px;
      padding: 16px 24px 16px 0;
    }
    [data-composition-id="lower-third"] .accent-bar {
      width: 6px;
      height: 80px;
      background: #ef4444;
      border-radius: 3px;
      margin-right: 20px;
    }
    [data-composition-id="lower-third"] .content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    [data-composition-id="lower-third"] .channel {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
    }
    [data-composition-id="lower-third"] .tagline {
      font-size: 18px;
      color: rgba(255,255,255,0.6);
      font-weight: 400;
    }
    [data-composition-id="lower-third"] .subscribe {
      margin-left: 32px;
      background: #ef4444;
      color: #fff;
      padding: 14px 32px;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div
    id="root"
    data-composition-id="lower-third"
    data-start="0"
    data-width="1920"
    data-height="1080"
  >
    <div class="bar">
      <div class="accent-bar"></div>
      <div class="content">
        <span class="channel">HookForge</span>
        <span class="tagline">Subscribe for weekly motion tips</span>
      </div>
      <span class="subscribe">Subscribe</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script>
      const tl = gsap.timeline({ paused: true });
      tl.from(".accent-bar", { scaleY: 0, duration: 0.4, ease: "power2.out" })
        .from(".channel", { x: -40, opacity: 0, duration: 0.5, ease: "power3.out" }, "-=0.2")
        .from(".tagline", { x: -30, opacity: 0, duration: 0.4, ease: "power2.out" }, "-=0.3")
        .from(".subscribe", { x: 30, opacity: 0, duration: 0.5, ease: "power3.out" }, "-=0.3");

      window.__timelines = window.__timelines || {};
      window.__timelines["lower-third"] = tl;
    </script>
  </div>
</body>
</html>
