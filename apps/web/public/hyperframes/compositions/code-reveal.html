<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    [data-composition-id="code-reveal"] {
      font-family: "SF Mono", "Fira Code", monospace;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
    }
    [data-composition-id="code-reveal"] .terminal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      width: 100%;
      max-width: 900px;
      overflow: hidden;
      box-shadow: 0 16px 64px rgba(0,0,0,0.4);
    }
    [data-composition-id="code-reveal"] .titlebar {
      background: #21262d;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    [data-composition-id="code-reveal"] .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    [data-composition-id="code-reveal"] .dot.red { background: #ff5f57; }
    [data-composition-id="code-reveal"] .dot.yellow { background: #febc2e; }
    [data-composition-id="code-reveal"] .dot.green { background: #28c840; }
    [data-composition-id="code-reveal"] .code {
      padding: 32px;
      font-size: 22px;
      line-height: 1.7;
      color: #e6edf3;
    }
    [data-composition-id="code-reveal"] .kw { color: #ff7b72; }
    [data-composition-id="code-reveal"] .fn { color: #d2a8ff; }
    [data-composition-id="code-reveal"] .str { color: #a5d6ff; }
    [data-composition-id="code-reveal"] .cm { color: #8b949e; }
    [data-composition-id="code-reveal"] .cursor {
      display: inline-block;
      width: 12px;
      height: 24px;
      background: #58a6ff;
      vertical-align: text-bottom;
      margin-left: 2px;
    }
  </style>
</head>
<body>
  <div
    id="root"
    data-composition-id="code-reveal"
    data-start="0"
    data-width="1920"
    data-height="1080"
  >
    <div class="terminal">
      <div class="titlebar">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>
      <div class="code">
        <div class="line line-1"><span class="kw">const</span> video = <span class="fn">render</span>({</div>
        <div class="line line-2">&nbsp;&nbsp;source: <span class="str">"index.html"</span>,</div>
        <div class="line line-3">&nbsp;&nbsp;output: <span class="str">"promo.mp4"</span></div>
        <div class="line line-4">});<span class="cursor"></span></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script>
      const tl = gsap.timeline({ paused: true });
      tl.from(".terminal", { y: 40, opacity: 0, duration: 0.6, ease: "power3.out" })
        .from(".line-1", { opacity: 0, duration: 0.3 })
        .from(".line-2", { opacity: 0, duration: 0.25 }, "-=0.1")
        .from(".line-3", { opacity: 0, duration: 0.25 }, "-=0.1")
        .from(".line-4", { opacity: 0, duration: 0.25 }, "-=0.1")
        .from(".cursor", { opacity: 0, duration: 0.1 })
        .to(".cursor", { opacity: 0, duration: 0.4, repeat: 3, yoyo: true, ease: "steps(1)" });

      window.__timelines = window.__timelines || {};
      window.__timelines["code-reveal"] = tl;
    </script>
  </div>
</body>
</html>
