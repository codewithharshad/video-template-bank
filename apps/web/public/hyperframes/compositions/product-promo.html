<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    [data-composition-id="product-promo"] {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #fafafa 0%, #e8e8f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    [data-composition-id="product-promo"] .card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 64px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.12);
      text-align: center;
      max-width: 700px;
    }
    [data-composition-id="product-promo"] .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #f97316, #fb923c);
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 800;
      color: #fff;
    }
    [data-composition-id="product-promo"] h1 {
      font-size: 56px;
      font-weight: 800;
      color: #111;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }
    [data-composition-id="product-promo"] p {
      font-size: 24px;
      color: #666;
      margin-bottom: 32px;
    }
    [data-composition-id="product-promo"] .cta {
      display: inline-block;
      background: #111;
      color: #fff;
      padding: 16px 40px;
      border-radius: 100px;
      font-size: 18px;
      font-weight: 600;
    }
    [data-composition-id="product-promo"] .badge {
      position: absolute;
      top: 60px;
      right: 60px;
      background: #f97316;
      color: #fff;
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div
    id="root"
    data-composition-id="product-promo"
    data-start="0"
    data-width="1920"
    data-height="1080"
  >
    <div class="badge">New</div>
    <div class="card">
      <div class="logo">H</div>
      <h1>HookForge Pro</h1>
      <p>Viral motion graphics, rendered from HTML</p>
      <span class="cta">Get started free</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script>
      const tl = gsap.timeline({ paused: true });
      tl.from(".card", { y: 80, opacity: 0, scale: 0.9, duration: 0.8, ease: "power3.out" })
        .from(".logo", { scale: 0, rotation: -180, duration: 0.6, ease: "back.out(2)" }, "-=0.4")
        .from("h1", { y: 30, opacity: 0, duration: 0.5, ease: "power2.out" }, "-=0.3")
        .from("p", { y: 20, opacity: 0, duration: 0.4, ease: "power2.out" }, "-=0.2")
        .from(".cta", { y: 20, opacity: 0, duration: 0.4, ease: "power2.out" }, "-=0.1")
        .from(".badge", { x: 40, opacity: 0, duration: 0.4, ease: "power2.out" }, "-=0.6");

      window.__timelines = window.__timelines || {};
      window.__timelines["product-promo"] = tl;
    </script>
  </div>
</body>
</html>
