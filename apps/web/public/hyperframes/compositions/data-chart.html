<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    [data-composition-id="data-chart"] {
      font-family: Georgia, "Times New Roman", serif;
      background: #f5f0e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
    }
    [data-composition-id="data-chart"] .headline {
      font-size: 42px;
      font-weight: 400;
      color: #1a1a1a;
      margin-bottom: 12px;
      text-align: center;
      max-width: 900px;
      line-height: 1.3;
    }
    [data-composition-id="data-chart"] .subhead {
      font-size: 18px;
      color: #666;
      margin-bottom: 60px;
      font-family: system-ui, sans-serif;
    }
    [data-composition-id="data-chart"] .chart {
      display: flex;
      align-items: flex-end;
      gap: 32px;
      height: 400px;
    }
    [data-composition-id="data-chart"] .bar-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    [data-composition-id="data-chart"] .bar {
      width: 80px;
      background: #1a1a1a;
      border-radius: 4px 4px 0 0;
      transform-origin: bottom;
    }
    [data-composition-id="data-chart"] .bar.accent { background: #c45c26; }
    [data-composition-id="data-chart"] .label {
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #666;
      font-weight: 500;
    }
    [data-composition-id="data-chart"] .value {
      font-family: system-ui, sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
    }
  </style>
</head>
<body>
  <div
    id="root"
    data-composition-id="data-chart"
    data-start="0"
    data-width="1920"
    data-height="1080"
  >
    <h2 class="headline">Creator engagement grew 3× after switching to motion hooks</h2>
    <p class="subhead">Average views per video, by quarter (millions)</p>
    <div class="chart">
      <div class="bar-group">
        <span class="value">1.2M</span>
        <div class="bar" style="height: 120px;"></div>
        <span class="label">Q1</span>
      </div>
      <div class="bar-group">
        <span class="value">2.1M</span>
        <div class="bar" style="height: 210px;"></div>
        <span class="label">Q2</span>
      </div>
      <div class="bar-group">
        <span class="value">2.8M</span>
        <div class="bar accent" style="height: 280px;"></div>
        <span class="label">Q3</span>
      </div>
      <div class="bar-group">
        <span class="value">3.6M</span>
        <div class="bar accent" style="height: 360px;"></div>
        <span class="label">Q4</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script>
      const tl = gsap.timeline({ paused: true });
      tl.from(".headline", { y: 30, opacity: 0, duration: 0.6, ease: "power2.out" })
        .from(".subhead", { y: 20, opacity: 0, duration: 0.4, ease: "power2.out" }, "-=0.3")
        .from(".bar", { scaleY: 0, duration: 0.7, stagger: 0.15, ease: "power3.out" }, "-=0.1")
        .from(".value", { opacity: 0, y: 10, duration: 0.3, stagger: 0.1 }, "-=0.4")
        .from(".label", { opacity: 0, duration: 0.3, stagger: 0.1 }, "-=0.3");

      window.__timelines = window.__timelines || {};
      window.__timelines["data-chart"] = tl;
    </script>
  </div>
</body>
</html>
